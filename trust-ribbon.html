<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Ribbon — TheoEducation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Source Sans Pro', system-ui, -apple-system, sans-serif;
            background-color: #F5F0E8;
            padding: 40px 20px;
        }

        .trust-ribbon {
            background: linear-gradient(135deg, #F5F0E8 0%, #FFFBF5 100%);
            border-top: 1px solid #E0DBD2;
            border-bottom: 1px solid #E0DBD2;
            padding: 60px 40px;
            margin: 0;
        }

        .trust-ribbon-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .trust-ribbon-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .trust-ribbon-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            color: #2D2A26;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .trust-ribbon-header p {
            font-size: 16px;
            color: #4A4540;
            line-height: 1.5;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin-bottom: 60px;
        }

        .stat-item {
            text-align: center;
            padding: 20px;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            color: #C4A23E;
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #7A7570;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .trust-badges {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .badge {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            background: #FFFFFF;
            border: 1px solid #E0DBD2;
            border-radius: 8px;
            font-size: 13px;
            color: #4A4540;
            font-weight: 600;
            text-align: center;
            min-height: 60px;
        }

        .badge svg {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .trust-ribbon {
                padding: 40px 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 30px;
                margin-bottom: 40px;
            }

            .trust-badges {
                gap: 15px;
            }

            .badge {
                padding: 10px 16px;
                font-size: 12px;
                min-height: 50px;
            }

            .badge svg {
                width: 20px;
                height: 20px;
            }
        }
    </style>
</head>
<body>

<section class="trust-ribbon">
    <div class="trust-ribbon-container">
        <div class="trust-ribbon-header">
            <h2>Why Thousands Choose TheoEducation</h2>
            <p>Trusted by pastors, theologians, and serious Bible learners worldwide</p>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number">600+</div>
                <div class="stat-label">Active Learners</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">84+</div>
                <div class="stat-label">Courses</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">150+</div>
                <div class="stat-label">Hours</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">22</div>
                <div class="stat-label">Years Content</div>
            </div>
        </div>

        <div class="trust-badges">
            <div class="badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#C4A23E" stroke-width="2">
                    <path d="M12 2L15.09 8.26H22L17.36 12.74L19.45 18.99L12 14.51L4.55 18.99L6.64 12.74L2 8.26H8.91L12 2Z"></path>
                </svg>
                <span>NAD Approved</span>
            </div>
            <div class="badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#C4A23E" stroke-width="2">
                    <path d="M9 12l2 2 4-4m7 0a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>Certificate Programs</span>
            </div>
            <div class="badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#C4A23E" stroke-width="2">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>Lifetime Access</span>
            </div>
            <div class="badge">
                <svg viewBox="0 0 24 24" fill="none" stroke="#C4A23E" stroke-width="2">
                    <path d="M9 12l2 2 4-4m0-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>14-Day Guarantee</span>
            </div>
        </div>
    </div>
</section>

</body>
</html>
