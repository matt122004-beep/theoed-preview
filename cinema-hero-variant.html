<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Premium Hero — TheoEd Variant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', system-ui; }

/* CINEMA HERO - MasterClass-inspired */
.cinema-hero {
  position: relative;
  width: 100%;
  min-height: 100vh;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.cinema-hero__bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(to right, #0a0a0a 0%, rgba(10, 10, 10, 0.7) 50%, transparent 100%),
              url('https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1400&q=90') right center / cover no-repeat;
  opacity: 0.6;
  z-index: 1;
}

.cinema-hero__content {
  position: relative;
  z-index: 2;
  max-width: 600px;
  padding: 60px 40px;
  color: #fff;
  text-align: left;
}

.cinema-hero__eyebrow {
  display: block;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #d4af37;
  margin-bottom: 24px;
  font-weight: 600;
}

.cinema-hero__headline {
  font-family: 'Playfair Display', serif;
  font-size: clamp(36px, 8vw, 72px);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 20px;
  letter-spacing: -1px;
}

.cinema-hero__highlight {
  color: #d4af37;
}

.cinema-hero__subheading {
  font-size: 18px;
  line-height: 1.6;
  color: #e8e0d0;
  margin-bottom: 40px;
  max-width: 500px;
}

.cinema-hero__cta-group {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.cinema-hero__cta {
  display: inline-block;
  padding: 16px 40px;
  border-radius: 6px;
  font-weight: 600;
  font-size: 15px;
  text-decoration: none;
  transition: all 0.3s ease;
  border: none;
  cursor: pointer;
}

.cinema-hero__cta--primary {
  background: #d4af37;
  color: #0a0a0a;
}

.cinema-hero__cta--primary:hover {
  background: #e8c844;
  transform: translateY(-2px);
}

.cinema-hero__cta--secondary {
  background: transparent;
  color: #fff;
  border: 2px solid #fff;
}

.cinema-hero__cta--secondary:hover {
  background: #fff;
  color: #0a0a0a;
  transform: translateY(-2px);
}

.cinema-hero__stats {
  display: flex;
  gap: 40px;
  margin-top: 60px;
  padding-top: 40px;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.cinema-hero__stat {
  text-align: center;
}

.cinema-hero__stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: #d4af37;
  display: block;
  margin-bottom: 8px;
}

.cinema-hero__stat-label {
  font-size: 12px;
  color: #b0a090;
  letter-spacing: 1px;
  text-transform: uppercase;
}

@media (max-width: 768px) {
  .cinema-hero__content {
    padding: 40px 24px;
  }
  
  .cinema-hero__headline {
    font-size: 42px;
  }
  
  .cinema-hero__subheading {
    font-size: 16px;
  }
  
  .cinema-hero__stats {
    flex-direction: column;
    gap: 24px;
    margin-top: 40px;
    padding-top: 24px;
  }
  
  .cinema-hero__cta-group {
    flex-direction: column;
  }
  
  .cinema-hero__cta {
    width: 100%;
    text-align: center;
  }
}
</style>
</head>
<body>

<section class="cinema-hero">
  <div class="cinema-hero__bg"></div>
  
  <div class="cinema-hero__content">
    <span class="cinema-hero__eyebrow">Seminary-Level Biblical Scholarship</span>
    
    <h1 class="cinema-hero__headline">
      Master the Bible.<br>
      <span class="cinema-hero__highlight">Transform Your Leadership.</span>
    </h1>
    
    <p class="cinema-hero__subheading">
      Go deeper into Scripture with world-class scholars. Gain the clarity and confidence to lead with conviction.
    </p>
    
    <div class="cinema-hero__cta-group">
      <a href="#" class="cinema-hero__cta cinema-hero__cta--primary">Start 7-Day Free Trial</a>
      <a href="#" class="cinema-hero__cta cinema-hero__cta--secondary">Explore Courses</a>
    </div>
    
    <div class="cinema-hero__stats">
      <div class="cinema-hero__stat">
        <span class="cinema-hero__stat-number">600+</span>
        <span class="cinema-hero__stat-label">Pastors &amp; Leaders</span>
      </div>
      <div class="cinema-hero__stat">
        <span class="cinema-hero__stat-number">150+</span>
        <span class="cinema-hero__stat-label">Hours of Content</span>
      </div>
      <div class="cinema-hero__stat">
        <span class="cinema-hero__stat-number">22+</span>
        <span class="cinema-hero__stat-label">Courses</span>
      </div>
    </div>
  </div>
</section>

</body>
</html>
