<section class="rgpt-hero-stats">
  <style>
    .rgpt-hero-stats {
      background: linear-gradient(135deg, #3D2B1A 0%, #4A3F2A 100%);
      padding: 60px 20px;
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .rgpt-hero-stats__container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .rgpt-hero-stats__intro {
      font-size: 14px;
      font-weight: 600;
      color: #C4A23E;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
    }

    .rgpt-hero-stats__headline {
      font-size: clamp(24px, 5vw, 42px);
      font-weight: 700;
      color: #FFFFFF;
      margin-bottom: 40px;
      line-height: 1.2;
    }

    .rgpt-hero-stats__grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .rgpt-hero-stats__card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(196, 162, 62, 0.3);
      border-radius: 12px;
      padding: 30px 20px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .rgpt-hero-stats__card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #C4A23E;
      transform: translateY(-4px);
    }

    .rgpt-hero-stats__number {
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 700;
      color: #C4A23E;
      line-height: 1;
      margin-bottom: 12px;
    }

    .rgpt-hero-stats__label {
      font-size: 14px;
      color: #E0DBD2;
      font-weight: 500;
      text-transform: capitalize;
    }

    .rgpt-hero-stats__subtext {
      font-size: 13px;
      color: #7A7570;
      margin-top: 6px;
      font-weight: 400;
    }

    .rgpt-hero-stats__divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C4A23E, transparent);
      margin: 0 auto 30px;
    }

    .rgpt-hero-stats__cta-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      align-items: center;
    }

    .rgpt-hero-stats__btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .rgpt-hero-stats__btn--primary {
      background: #C4A23E;
      color: #2D2A26;
    }

    .rgpt-hero-stats__btn--primary:hover {
      background: #E0C158;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(196, 162, 62, 0.3);
    }

    .rgpt-hero-stats__btn--secondary {
      background: transparent;
      color: #C4A23E;
      border: 2px solid #C4A23E;
    }

    .rgpt-hero-stats__btn--secondary:hover {
      background: rgba(196, 162, 62, 0.1);
      border-color: #E0C158;
      color: #E0C158;
    }

    @media (max-width: 768px) {
      .rgpt-hero-stats {
        padding: 40px 16px;
      }

      .rgpt-hero-stats__grid {
        grid-template-columns: 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .rgpt-hero-stats__cta-row {
        gap: 12px;
      }

      .rgpt-hero-stats__btn {
        padding: 12px 24px;
        font-size: 13px;
      }
    }
  </style>

  <div class="rgpt-hero-stats__container">
    <div class="rgpt-hero-stats__intro">Why Pastors Choose Us</div>
    <h2 class="rgpt-hero-stats__headline">Join 600+ Lifelong Learners</h2>

    <div class="rgpt-hero-stats__grid">
      <div class="rgpt-hero-stats__card">
        <div class="rgpt-hero-stats__number">600+</div>
        <div class="rgpt-hero-stats__label">Pastors & Leaders</div>
        <div class="rgpt-hero-stats__subtext">From 50+ countries</div>
      </div>

      <div class="rgpt-hero-stats__card">
        <div class="rgpt-hero-stats__number">150+</div>
        <div class="rgpt-hero-stats__label">Hours of Content</div>
        <div class="rgpt-hero-stats__subtext">Seminary-level depth</div>
      </div>

      <div class="rgpt-hero-stats__card">
        <div class="rgpt-hero-stats__number">22+</div>
        <div class="rgpt-hero-stats__label">Complete Courses</div>
        <div class="rgpt-hero-stats__subtext">Bible, history, theology</div>
      </div>
    </div>

    <div class="rgpt-hero-stats__divider"></div>

    <div class="rgpt-hero-stats__cta-row">
      <a href="#" class="rgpt-hero-stats__btn rgpt-hero-stats__btn--primary">Start Learning</a>
      <a href="#" class="rgpt-hero-stats__btn rgpt-hero-stats__btn--secondary">Browse Courses</a>
    </div>
  </div>
</section>
